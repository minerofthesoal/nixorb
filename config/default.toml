# NixOrb default configuration
# Copy to ~/.config/nixorb/config.toml and customize

# ── Orb UI ─────────────────────────────────────────────────────── #
hotkey = "Ctrl+Alt+Space"
orb_size = 120
orb_opacity = 1.0

# ── ASR ────────────────────────────────────────────────────────── #
asr_model = "large-v3"
asr_language = "en"
mic_sensitivity = 0.5

# ── LLM (Local Ollama) ─────────────────────────────────────────── #
llm_backend = "ollama"
llm_model = "llama3.2"
ollama_host = "http://localhost:11434"
llm_max_tokens = 512
llm_temperature = 0.7

# ── TTS ────────────────────────────────────────────────────────── #
tts_backend = "piper"
tts_voice = "en_US-lessac-medium"
tts_speed = 1.0
tts_volume = 1.0

# ── Wake Word ──────────────────────────────────────────────────── #
wake_word_enabled = true
wake_word_model = "hey_nixorb"
wake_word_sensitivity = 0.5

# ── Features ───────────────────────────────────────────────────── #
screen_capture_enabled = true
web_search_enabled = true
clipboard_enabled = true
require_action_confirmation = true
memory_enabled = true
plugins_enabled = true
