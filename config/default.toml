# NixOrb default configuration
# Copied to ~/.config/nixorb/config.toml on first run.
# All values here are the application defaults.

# ── Orb UI ────────────────────────────────────────────────────────── #
# orb_x = 1820      # pin position X (pixels from left edge)
# orb_y = 40        # pin position Y (pixels from top)
orb_size = 120
hotkey = "Ctrl+Alt+Space"

# ── ASR ───────────────────────────────────────────────────────────── #
asr_model    = "large-v3"   # faster-whisper model size
asr_language = ""           # blank = auto-detect

# ── LLM backend ───────────────────────────────────────────────────── #
# Options: "openai" | "ollama" | "local"
llm_backend  = "openai"
llm_model    = "gpt-4o-mini"
llm_base_url = "https://api.openai.com/v1"
openai_api_key    = ""      # set via env OPENAI_API_KEY or settings GUI
local_model_path  = ""      # e.g. ~/models/mistral-7b-q4.gguf
fallback_model_path = ""    # offline fallback gguf path
llm_vram_mb  = 4096         # VRAM budget for local LLM (MB)

# ── TTS ───────────────────────────────────────────────────────────── #
# Options: "openai" | "huggingface" | "piper"
tts_backend  = "openai"
tts_voice    = "alloy"      # OpenAI: alloy/echo/fable/onyx/nova/shimmer
tts_hf_repo  = ""           # HuggingFace repo ID for HF TTS
hf_token     = ""           # HuggingFace API token

# ── Features ──────────────────────────────────────────────────────── #
wake_word_enabled           = false
wake_word_model             = "hey_jarvis_v0.1"
screen_capture_enabled      = true
offline_fallback_enabled    = true
require_action_confirmation = true
clipboard_enabled           = true

# ── Appearance ────────────────────────────────────────────────────── #
# (override in GUI or here)
