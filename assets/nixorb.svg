<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="orbGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#a0d4ff" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#4A90D9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a3a6e" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4A90D9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="60" cy="60" r="58" fill="url(#glowGrad)" filter="url(#blur)"/>
  <!-- Main orb -->
  <circle cx="60" cy="60" r="50" fill="url(#orbGrad)"/>
  <!-- Inner highlight -->
  <ellipse cx="48" cy="44" rx="16" ry="10" fill="white" opacity="0.25"/>
  <!-- Ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#7ec8f0" stroke-width="1.5" opacity="0.5"/>
</svg>
