version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ai-deps:
        patterns: ["torch*", "faster-whisper*", "openai*", "transformers*"]
      qt-deps:
        patterns: ["PySide6*", "qasync*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
