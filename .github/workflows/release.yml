name: Release

on:
  # ── Trigger 1: push a version tag  (git tag v0.1.0 && git push --tags)
  push:
    tags:
      - 'v*.*.*'

  # ── Trigger 2: click "Run workflow" on GitHub Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      create_release:
        description: 'Create GitHub Release?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  id-token: write   # for PyPI OIDC

env:
  PYTHON_VERSION: "3.12"

# ── Resolve version from either tag or manual input ─────────────────── #
jobs:
  meta:
    name: Resolve version
    runs-on: ubuntu-22.04
    outputs:
      package:    ${{ steps.resolve.outputs.package }}
      version:    ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      tag:        ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          PACKAGE=$(grep -m1 '^name' pyproject.toml | sed -E 's/^name\s*=\s*"([^"]+)".*/\1/')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            # Strip leading 'v' from tag name
            VERSION="${GITHUB_REF_NAME#v}"
            # Tags with a hyphen (v1.0.0-beta) are pre-releases
            if echo "$VERSION" | grep -q '-'; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi
          TAG="v${VERSION}"
          echo "package=$PACKAGE"    >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"    >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "Resolved: package=$PACKAGE  version=$VERSION  prerelease=$PRERELEASE  tag=$TAG"

      # Publishes package name + the exact version you picked, linked
      # right away — visible on the workflow run page the moment the
      # release starts, before any of the builds below even finish.
      - name: Publish version summary
        run: |
          PACKAGE="${{ steps.resolve.outputs.package }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          TAG="${{ steps.resolve.outputs.tag }}"
          REPO="${{ github.server_url }}/${{ github.repository }}"
          {
            echo "## 🚀 Releasing \`${PACKAGE}\` ${VERSION}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Package | \`${PACKAGE}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Tag | [\`${TAG}\`](${REPO}/releases/tag/${TAG}) |"
            echo "| PyPI (once published) | [pypi.org/project/${PACKAGE}/${VERSION}/](https://pypi.org/project/${PACKAGE}/${VERSION}/) |"
            echo "| GitHub Release (once created) | [${REPO}/releases/tag/${TAG}](${REPO}/releases/tag/${TAG}) |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────── #
  #  Python wheel + sdist                                              #
  # ────────────────────────────────────────────────────────────────── #
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-22.04
    needs: meta
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Patch version
        run: |
          sed -i "s/^__version__ = .*/__version__ = \"${{ needs.meta.outputs.version }}\"/" nixorb/__init__.py
          grep "^__version__" nixorb/__init__.py

      - name: Build
        run: |
          pip install -q hatchling build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  # ────────────────────────────────────────────────────────────────── #
  #  Publish to PyPI (only on tag push or if manually enabled)        #
  # ────────────────────────────────────────────────────────────────── #
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    needs: [meta, build-wheel]
    # Skip PyPI publish on manual runs unless explicitly enabled
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.create_release == 'true')
    environment:
      name: pypi
      url: https://pypi.org/p/nixorb
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Check if this version is already on PyPI
        id: check
        run: |
          PACKAGE="${{ needs.meta.outputs.package }}"
          VERSION="${{ needs.meta.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/${PACKAGE}/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PACKAGE} ${VERSION} is already published on PyPI — skipping upload."
            echo "::notice::If you meant to publish new changes, bump the version and re-run."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  # ────────────────────────────────────────────────────────────────── #
  #  Arch Linux pacman package                                         #
  # ────────────────────────────────────────────────────────────────── #
  build-pacman:
    name: Build pacman package
    runs-on: ubuntu-22.04
    needs: meta
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap Arch build environment
        run: |
          pacman-key --init
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git python python-pip \
            python-build python-installer python-wheel \
            qt6-base qt6-declarative qt6-tools qt6-shadertools \
            python-hatchling \
            cmake ninja gcc

      - name: Patch version
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/PKGBUILD
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" nixorb/__init__.py

      - name: Build source tarball
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          python assets/generate_icon.py
          tar --exclude='*.pyc' --exclude='__pycache__' \
              --exclude='.git' --exclude='*.tar.gz' \
              -czf "nixorb-${VERSION}.tar.gz" \
              --transform "s|^|nixorb-${VERSION}/|" \
              nixorb/ assets/ config/ plugins/ packaging/ \
              tests/ pyproject.toml README.md LICENSE \
              install.fish install.sh
          SHA256=$(sha256sum "nixorb-${VERSION}.tar.gz" | cut -d' ' -f1)
          echo "SHA256=$SHA256"
          cp "nixorb-${VERSION}.tar.gz" packaging/
          sed -i "s/sha256sums=.*/sha256sums=('${SHA256}')/" packaging/PKGBUILD

      - name: Build package as non-root user
        run: |
          useradd -m builder
          cp -r . /home/builder/nixorb
          chown -R builder:builder /home/builder/nixorb
          cd /home/builder/nixorb/packaging
          su builder -c "makepkg --noconfirm --cleanbuild --skipinteg -d"
          cp *.pkg.tar.zst /home/builder/

      - uses: actions/upload-artifact@v4
        with:
          name: pacman-pkg
          path: /home/builder/nixorb-*.pkg.tar.zst

  # ────────────────────────────────────────────────────────────────── #
  #  AppImage                                                          #
  # ────────────────────────────────────────────────────────────────── #
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04
    needs: meta
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 portaudio19-dev ffmpeg libfuse2 \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qt6-shader-baker \
            python3-dev

      - name: Patch version
        run: |
          sed -i "s/^__version__ = .*/__version__ = \"${{ needs.meta.outputs.version }}\"/" nixorb/__init__.py

      - name: Install Python tools
        run: |
          pip install -q hatchling build

          # See ci.yml for context: download.pytorch.org / download-r2.pytorch.org
          # has long-standing, well-documented intermittent TLS/connection
          # failures unrelated to this project — retry with backoff.
          for attempt in 1 2 3 4 5; do
            if pip install -q torch==2.7.1+cpu \
                 --index-url https://download.pytorch.org/whl/cpu; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Failed to install torch from PyTorch's CDN after 5 attempts."
              exit 1
            fi
            echo "Attempt $attempt failed, retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done

          pip install -q appimage-builder
          pip install -q -e .

      - name: Compile shaders
        run: |
          QSB=$(find /usr -name qsb -type f 2>/dev/null | head -1)
          if [ -n "$QSB" ]; then
            $QSB --glsl "100es,120,150" --hlsl 50 --msl 12 \
              assets/shaders/orb_glow.vert -o assets/shaders/orb_glow.vert.qsb
            $QSB --glsl "100es,120,150" --hlsl 50 --msl 12 \
              assets/shaders/orb_glow.frag -o assets/shaders/orb_glow.frag.qsb
          else
            echo "WARNING: qsb not found, shaders not compiled"
            touch assets/shaders/orb_glow.vert.qsb assets/shaders/orb_glow.frag.qsb
          fi

      - name: Build AppImage
        env:
          NIXORB_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cd packaging/appimage
          bash build_appimage.sh "$NIXORB_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: packaging/appimage/NixOrb-*.AppImage

  # ────────────────────────────────────────────────────────────────── #
  #  Flatpak                                                           #
  # ────────────────────────────────────────────────────────────────── #
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-22.04
    needs: meta
    container:
      # NOTE: docker.io/bilelmoussaoui/flatpak-github-actions is deprecated
      # upstream and no longer published for newer runtimes (there is no
      # "kde-6.8" tag under that image, hence "manifest unknown" pulls).
      # The maintained successor lives under flathub-infra on ghcr.io.
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.8
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Patch version
        run: |
          sed -i "s/^__version__ = .*/__version__ = \"${{ needs.meta.outputs.version }}\"/" nixorb/__init__.py

      - name: Pre-download Python wheels
        run: |
          mkdir -p wheels
          pip download -d wheels \
            faster-whisper openai chromadb aiohttp qasync \
            "pydantic>=2.7" pydantic-settings tomli-w "typer[all]" \
            rich pygments openwakeword huggingface-hub cryptography \
            aiofiles sounddevice soundfile numpy pynput hypernix \
            2>/dev/null || true

      - name: Build Flatpak
        # NOTE: bilelmoussaoui/flatpak-github-actions is deprecated; the
        # actively maintained fork/successor is flatpak/flatpak-github-actions.
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle:        NixOrb-${{ needs.meta.outputs.version }}.flatpak
          manifest-path: packaging/io.nixorb.NixOrb.yml
          cache-key:     flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: NixOrb-*.flatpak

  # ────────────────────────────────────────────────────────────────── #
  #  Create GitHub Release                                             #
  # ────────────────────────────────────────────────────────────────── #
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [meta, build-wheel, build-pacman, build-appimage, build-flatpak]
    if: >
      always() &&
      (github.event_name == 'push' ||
       github.event.inputs.create_release == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Create or update git tag (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.meta.outputs.tag }}"
          # Delete existing tag if present (allows re-running)
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "${{ needs.meta.outputs.tag }}" | head -1 || true)
          if [ -n "$PREV" ]; then
            LOG=$(git log "${PREV}..${{ needs.meta.outputs.tag }}" --oneline --no-merges 2>/dev/null | head -40 || echo "Initial release")
          else
            LOG=$(git log --oneline --no-merges | head -20)
          fi
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.meta.outputs.tag }}
          name:       NixOrb ${{ needs.meta.outputs.version }}
          draft:      false
          prerelease: ${{ needs.meta.outputs.prerelease }}
          body: |
            ## NixOrb ${{ needs.meta.outputs.version }}

            ### Install

            **Arch Linux (recommended)**
            ```bash
            sudo pacman -U nixorb-${{ needs.meta.outputs.version }}-1-x86_64.pkg.tar.zst
            ```

            **PyPI**
            ```bash
            pip install nixorb==${{ needs.meta.outputs.version }}
            ```

            **AppImage (portable)**
            ```bash
            chmod +x NixOrb-${{ needs.meta.outputs.version }}-x86_64.AppImage
            ./NixOrb-${{ needs.meta.outputs.version }}-x86_64.AppImage start
            ```

            **Flatpak**
            ```bash
            flatpak install NixOrb-${{ needs.meta.outputs.version }}.flatpak
            flatpak run io.nixorb.NixOrb
            ```

            ### Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            release-assets/python-dist/*
            release-assets/pacman-pkg/*
            release-assets/appimage/*
            release-assets/flatpak/*

  # ────────────────────────────────────────────────────────────────── #
  #  Publish version + links summary                                  #
  #  Always runs last, regardless of which build jobs succeeded, so    #
  #  the workflow run page always shows the package name and version  #
  #  you picked, linked directly to where it actually landed.         #
  # ────────────────────────────────────────────────────────────────── #
  publish-summary:
    name: Publish version summary
    runs-on: ubuntu-22.04
    needs: [meta, publish-pypi, create-release]
    if: always()
    steps:
      - name: Write summary
        run: |
          PACKAGE="${{ needs.meta.outputs.package }}"
          VERSION="${{ needs.meta.outputs.version }}"
          TAG="${{ needs.meta.outputs.tag }}"
          REPO="${{ github.server_url }}/${{ github.repository }}"

          RELEASE_STATUS="${{ needs['create-release'].result }}"
          PYPI_STATUS="${{ needs['publish-pypi'].result }}"

          {
            echo "## 📦 ${PACKAGE} ${VERSION} — published"
            echo ""
            echo "| Target | Status | Link |"
            echo "|---|---|---|"
            if [ "$RELEASE_STATUS" = "success" ]; then
              echo "| GitHub Release | ✅ | [${TAG}](${REPO}/releases/tag/${TAG}) |"
            else
              echo "| GitHub Release | ⚠️ ${RELEASE_STATUS} | [${TAG}](${REPO}/releases/tag/${TAG}) |"
            fi
            if [ "$PYPI_STATUS" = "success" ]; then
              echo "| PyPI | ✅ | [${PACKAGE} ${VERSION}](https://pypi.org/project/${PACKAGE}/${VERSION}/) |"
            else
              echo "| PyPI | ⚠️ ${PYPI_STATUS} | [${PACKAGE} ${VERSION}](https://pypi.org/project/${PACKAGE}/${VERSION}/) |"
            fi
            echo "| Workflow run | — | [this run](${REPO}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "_Resolved from: $([ "${{ github.event_name }}" = "workflow_dispatch" ] && echo "manual input \`${VERSION}\`" || echo "pushed tag \`${GITHUB_REF_NAME}\`")_"
          } >> "$GITHUB_STEP_SUMMARY"
