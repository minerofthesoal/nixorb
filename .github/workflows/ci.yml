name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 portaudio19-dev ffmpeg \
            libglib2.0-0 libdbus-1-3 \
            qt6-base-dev qt6-declarative-dev \
            python3-dev

      - name: Install Python dependencies (CPU-only torch for CI)
        run: |
          pip install --upgrade pip

          # download.pytorch.org (and its CDN redirect, download-r2.pytorch.org)
          # has long-standing, well-documented intermittent TLS/connection
          # failures unrelated to this project — retry with backoff instead
          # of failing the whole job on a transient blip.
          for attempt in 1 2 3 4 5; do
            if pip install torch==2.7.1+cpu torchaudio==2.7.1+cpu \
                 --index-url https://download.pytorch.org/whl/cpu; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Failed to install torch from PyTorch's CDN after 5 attempts."
              exit 1
            fi
            echo "Attempt $attempt failed, retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done

          pip install -e ".[dev]"
          # Mock packages that require GPU or native libs in CI
          pip install sounddevice soundfile numpy

      - name: Lint with ruff
        run: ruff check nixorb/ tests/ --output-format=github

      - name: Type-check with mypy
        run: mypy nixorb/ --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_vram_manager.py \
            -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
