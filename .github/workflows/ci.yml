name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 portaudio19-dev ffmpeg \
            libglib2.0-0 libdbus-1-3 \
            qt6-base-dev qt6-declarative-dev \
            python3-dev

      - name: Install Python dependencies (CPU-only torch for CI)
        run: |
          pip install --upgrade pip
          pip install torch==2.7.1+cpu torchaudio==2.7.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
          # Mock packages that require GPU or native libs in CI
          pip install sounddevice soundfile numpy

      - name: Lint with ruff
        run: ruff check nixorb/ tests/ --output-format=github

      - name: Type-check with mypy
        run: mypy nixorb/ --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_vram_manager.py \
            -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
