# NixOrb AppImage build recipe
# Tool: appimage-builder (pip install appimage-builder)
# Usage: cd packaging/appimage && appimage-builder --recipe AppImageBuilder.yml

version: 1

AppDir:
  path: ./AppDir
  app_info:
    id:      io.nixorb.NixOrb
    name:    NixOrb
    icon:    nixorb
    version: !ENV ${NIXORB_VERSION:-0.1.0}
    exec:    usr/bin/python3
    exec_args: -m nixorb.cli start $@

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu jammy main restricted universe
    include:
      - python3
      - python3-pip
      - libportaudio2
      - ffmpeg
      - libglib2.0-0
      - libdbus-1-3
      - libxcb1
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-xinerama0
      - libxcb-xkb1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - libegl1
      - libgl1
      - libvulkan1

  files:
    include:
      - /usr/lib/python3*
    exclude:
      - usr/lib/python3/dist-packages/apt*
      - usr/lib/python3/dist-packages/apport*
      - usr/share/doc
      - usr/share/man

  runtime:
    env:
      PYTHONPATH: "$APPDIR/usr/lib/python3/dist-packages"
      QT_QPA_PLATFORM: wayland;xcb

  test:
    fedora-38:
      image: appimagetesting/fedora:38
      command: ./AppRun --version
    ubuntu-22.04:
      image: appimagetesting/ubuntu:22.04
      command: ./AppRun --version

AppImage:
  arch: x86_64
  name: NixOrb-!ENV ${NIXORB_VERSION:-0.1.0}-x86_64
  comp: zstd
  update-information: gh-releases-zsync|nixorb|nixorb|latest|NixOrb-*x86_64.AppImage.zsync
