version: 1

AppDir:
  path: ./AppDir
  app_info:
    id:      io.nixorb.NixOrb
    name:    NixOrb
    icon:    nixorb
    version: !ENV ${NIXORB_VERSION}
    exec:    usr/bin/python3
    exec_args: -m nixorb.cli start $@

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu jammy main restricted universe
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
      - sourceline: deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
      - sourceline: deb http://security.ubuntu.com/ubuntu jammy-security main restricted universe
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
    include:
      - python3
      - python3-pip
      - libportaudio2
      - ffmpeg
      - libglib2.0-0
      - libdbus-1-3
      - libxcb1
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-xinerama0
      - libxcb-xkb1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - libegl1
      - libgl1

  files:
    include:
      - /usr/lib/python3*
    exclude:
      - usr/share/doc
      - usr/share/man

  runtime:
    env:
      QT_QPA_PLATFORM: wayland;xcb

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|minerofthesoal|nixorb|latest|NixOrb-*x86_64.AppImage.zsync
