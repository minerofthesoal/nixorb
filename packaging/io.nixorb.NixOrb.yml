app-id: io.nixorb.NixOrb
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.cuda
command: nixorb
finish-args:
  # Wayland display
  - --socket=wayland
  - --socket=fallback-x11
  # GPU access (CUDA / NVIDIA)
  - --device=dri
  - --device=all             # needed for NVIDIA GPU passthrough
  # Audio
  - --socket=pulseaudio
  # Network (LLM API calls)
  - --share=network
  # Home directory for config and model files
  - --filesystem=home
  # D-Bus for KGlobalAccel and KDE Connect
  - --socket=session-bus
  - --talk-name=org.kde.kglobalaccel
  - --talk-name=org.kde.kdeconnect
  # Tray icon
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  env:
    PIP_NO_BUILD_ISOLATION: '1'

modules:
  # ── PortAudio ───────────────────────────────────────────────────── #
  - name: portaudio
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/PortAudio/portaudio.git
        tag: v19.7.0

  # ── Python deps (wheel bundle, generated by CI) ──────────────────── #
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-index --find-links=wheels/
          faster-whisper openai chromadb aiohttp qasync pydantic
          pydantic-settings tomli-w typer rich pygments openwakeword
          huggingface-hub cryptography aiofiles sounddevice soundfile
          numpy pynput hypernix llama-cpp-python
    sources:
      - type: dir
        path: wheels      # pre-downloaded by CI: pip download -d wheels -r requirements.txt

  # ── NixOrb itself ───────────────────────────────────────────────── #
  - name: nixorb
    buildsystem: simple
    build-commands:
      # Compile QML shaders
      - qsb --glsl "100es,120,150" --hlsl 50 --msl 12
            assets/shaders/orb_glow.vert -o assets/shaders/orb_glow.vert.qsb
      - qsb --glsl "100es,120,150" --hlsl 50 --msl 12
            assets/shaders/orb_glow.frag -o assets/shaders/orb_glow.frag.qsb
      # Install Python package
      - pip3 install --prefix=/app --no-build-isolation .
      # Assets
      - install -Dm755 packaging/nixorb.desktop /app/share/applications/io.nixorb.NixOrb.desktop
      - install -Dm644 assets/nixorb_256.png    /app/share/icons/hicolor/256x256/apps/io.nixorb.NixOrb.png
      - mkdir -p /app/share/nixorb
      - cp -r assets /app/share/nixorb/
      - cp -r config /app/share/nixorb/
    sources:
      - type: dir
        path: ..
